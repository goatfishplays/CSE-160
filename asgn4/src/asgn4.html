<!DOCTYPE html> <!-- HTML comment -->
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Blocky World</title>
</head>

<body onload="main()">
    <p>Ronan Wong</p>
    <p>roswong@ucsc.edu</p>
    <p>Notes to Grader:</p>
    <p>Point is white, spotlight is yellow, spotlight target is red</p>

    <br>
    <canvas id="webgl" width="600" height="600"> <!-- Defines the canvas to be a 400x400 pixel area on webpage -->
        Please use a browser that supports "canvas" <!-- Will be displayed if the canvas is unable to be rendered -->
    </canvas>
    <br>
    <br>
    <p id="performance"></p>
    <p id="time"></p>
    <br>
    Point:
    <br>
    X Pos
    <button type="button" id="lightXOnButton">On</button>
    <button type="button" id="lightXOffButton">Off</button>
    <input type="range" id="lightXSlider" max="360" min="0" value=0>
    Y Pos
    <button type="button" id="lightYOnButton">On</button>
    <button type="button" id="lightYOffButton">Off</button>
    <input type="range" id="lightYSlider" max="360" min="0" value=0>
    Z Pos
    <button type="button" id="lightZOnButton">On</button>
    <button type="button" id="lightZOffButton">Off</button>
    <input type="range" id="lightZSlider" max="360" min="0" value=0>
    <br>
    R<input type="range" id="lightRSlider" max="360" min="0" value=360>
    G<input type="range" id="lightGSlider" max="360" min="0" value=360>
    B<input type="range" id="lightBSlider" max="360" min="0" value=360>
    <br>
    Active
    <button type="button" id="LightingOnButton">On</button>
    <button type="button" id="LightingOffButton">Off</button>
    <br>
    <br>
    Spotlight:
    <br>
    X Pos
    <button type="button" id="spotPosXOnButton">On</button>
    <button type="button" id="spotPosXOffButton">Off</button>
    <input type="range" id="spotPosXSlider" max="360" min="0" value=0>
    Y Pos
    <button type="button" id="spotPosYOnButton">On</button>
    <button type="button" id="spotPosYOffButton">Off</button>
    <input type="range" id="spotPosYSlider" max="360" min="0" value=0>
    Z Pos
    <button type="button" id="spotPosZOnButton">On</button>
    <button type="button" id="spotPosZOffButton">Off</button>
    <input type="range" id="spotPosZSlider" max="360" min="0" value=0>
    <br>
    X Targ
    <!-- <button type="button" id="spotTargXOnButton">On</button> -->
    <!-- <button type="button" id="spotTargXOffButton">Off</button> -->
    <input type="range" id="spotTargXSlider" max="360" min="0" value=0>
    Y Targ
    <!-- <button type="button" id="spotTargYOnButton">On</button> -->
    <!-- <button type="button" id="spotTargYOffButton">Off</button> -->
    <input type="range" id="spotTargYSlider" max="360" min="0" value=0>
    Z Targ
    <!-- <button type="button" id="spotTargZOnButton">On</button>
    <button type="button" id="spotTargZOffButton">Off</button> -->
    <input type="range" id="spotTargZSlider" max="360" min="0" value=0>
    <br>
    R<input type="range" id="spotRSlider" max="360" min="0" value=360>
    G<input type="range" id="spotGSlider" max="360" min="0" value=360>
    B<input type="range" id="spotBSlider" max="360" min="0" value=360>
    <br>
    Active
    <button type="button" id="spotOnButton">On</button>
    <button type="button" id="spotOffButton">Off</button>
    <br>
    <br>

    Normal Visualization
    <button type="button" id="NormVisOnButton">On</button>
    <button type="button" id="NormVisOffButton">Off</button>
    <br>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/webgl-utils.js"></script>

    <script src="Cube.js"></script>
    <script src="Sphere.js"></script>
    <script src="Model.js"></script>
    <script src="Camera.js"></script>
    <script src="asgn4.js"></script>
</body>

</html>
